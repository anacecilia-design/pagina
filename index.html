<!DOCTYPE html>
<html>
<head>
  <title>Mi pagina</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: lightblue;
    }

    h1 {
      text-align: center;
      color: navy;
      font-style: italic;
      font-size: 60px;
      margin: 20px;
    }
  </style>
</head>

<body>

  <h1>MENU</h1>

  <div class="container">

    <div class="card mb-3">
      <div class="card-body">
        <h3>🍔 Hamburguesa</h3>
        <p>Carne, queso, lechuga y tomate</p>
        <p><strong>$2500</strong></p>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <h3>🍕 Pizza</h3>
        <p>Muzzarella con salsa de tomate</p>
        <p><strong>$4000</strong></p>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <h3>🍟 Papas fritas</h3>
        <p>Papas crocantes con sal</p>
        <p><strong>$1500</strong></p>
      </div>
    </div>

    <div class="card mt-4">
      <div class="card-body">
        <h3>📍 Contacto</h3>
        <p>Dirección: Av. Argentina 123</p>
        <p>Teléfono: 123456789</p>
        <p>Horario: 12:00 - 23:00</p>
      </div>
    </div>

  </div>

</body>
</html>
