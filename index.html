<!DOCTYPE html>
<html>
<head>
  <title>Mi pagina</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: lightblue;
    }

    h1 {
      text-align: center;
      color: navy;
      font-style: italic;
      font-size: 60px;
      margin: 20px;
    }

    .search-bar {
      max-width: 500px;
      margin: 30px auto; /* espacio entre barra y título */
    }

    .card {
      margin-bottom: 20px; /* espacio entre comidas */
    }
  </style>
</head>

<body>

  <h1>MENU</h1>

  <!-- BARRA DE BÚSQUEDA -->
  <div class="search-bar">
    <input type="text" id="searchInput" class="form-control" placeholder="Buscar comida...">
  </div>

  <div class="container" id="menuContainer">

    <div class="card" data-name="hamburguesa">
      <div class="card-body">
        <h3>🍔 Hamburguesa</h3>
        <p>Carne, queso, lechuga y tomate</p>
        <p><strong>$2500</strong></p>
      </div>
    </div>

    <div class="card" data-name="pizza">
      <div class="card-body">
        <h3>🍕 Pizza</h3>
        <p>Muzzarella con salsa de tomate</p>
        <p><strong>$4000</strong></p>
      </div>
    </div>

    <div class="card" data-name="papas fritas">
      <div class="card-body">
        <h3>🍟 Papas fritas</h3>
        <p>Papas crocantes con sal</p>
        <p><strong>$1500</strong></p>
      </div>
    </div>

    <!-- CONTACTO -->
    <div class="card mt-4" data-name="contacto">
      <div class="card-body">
        <h3>📍 Contacto</h3>
        <p>Dirección: Avenida Argentina 123</p>
        <p>Teléfono: 123456789</p>
        <p>Horario: 12:00 - 23:00</p>
      </div>
    </div>

  </div>

  <!-- SCRIPT DE FILTRADO MEJORADO -->
  <script>
    const searchInput = document.getElementById('searchInput');
    const cards = document.querySelectorAll('#menuContainer .card');

    searchInput.addEventListener('keyup', () => {
      const query = searchInput.value.toLowerCase().trim(); // minusculas y sin espacios al inicio/final

      cards.forEach(card => {
        const name = card.getAttribute('data-name').toLowerCase();

        // Mostrar la card solo si coincide exactamente
        if(name === query || query === '') {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    });
  </script>

</body>
</html>
